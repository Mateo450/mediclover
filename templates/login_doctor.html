{% extends "base.html" %}
{% block title %}Acceso Médico — MediClover{% endblock %}

{% block contenido %}
<div class="auth-wrap">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-top">
      <div class="auth-emblem">
        <img src="{{ url_for('static', filename='img/doctor.png') }}"
             alt="Doctor"
             style="width:100%;height:100%;border-radius:12px;object-fit:cover;object-position:top;">
      </div>
      <h2>Acceso Médico</h2>
      <p>Panel exclusivo para el Dr. Suárez</p>
    </div>

    <div class="auth-body">

      {% if error %}
        <div class="alert error">
          <i class="bi bi-x-circle-fill"></i> {{ error }}
        </div>
      {% endif %}

      {% if mensaje %}
        <div class="alert {{ 'success' if tipo == 'success' else 'error' }}">
          <i class="bi bi-{{ 'check-circle-fill' if tipo == 'success' else 'x-circle-fill' }}"></i>
          {{ mensaje }}
        </div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" name="usuario"
                 placeholder="Ej: Luis54"
                 value="{{ request.form.get('usuario','') }}"
                 required autofocus>
        </div>

        <div class="form-group" style="position:relative;">
          <label>Contraseña</label>
          <div style="position:relative;">
            <input type="password" name="password" id="passInput"
                   placeholder="••••••••" required
                   style="padding-right:2.8rem;">
            <button type="button" id="eyeBtn"
                    onclick="togglePass()"
                    style="position:absolute;right:.65rem;top:50%;transform:translateY(-50%);
                           background:none;border:none;cursor:pointer;color:var(--gray-400);
                           font-size:1rem;padding:0;line-height:1;transition:color .18s;">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-block" style="margin-top:.5rem;">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar al panel
        </button>
      </form>

      <div style="text-align:center; margin-top:1.1rem;">
        <a href="/doctor/recuperar"
           style="font-size:.83rem; color:var(--teal); font-weight:600; text-decoration:none;">
          <i class="bi bi-key"></i> ¿Olvidaste tu contraseña?
        </a>
      </div>

      <div class="auth-footer">
        <a href="/">← Volver al inicio</a>
      </div>
    </div>

  </div>
</div>

<script>
function togglePass() {
  const inp = document.getElementById('passInput');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'bi bi-eye';
  }
}
</script>
{% endblock %}

{% extends "base.html" %}

{% block contenido %}

<h1>👥 Pacientes</h1>

<div class="card">

<table>

<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Correo</th>
<th>Acciones</th>
</tr>

{% for paciente in pacientes %}

<tr>
<td>{{ paciente[1] }}</td>
<td>{{ paciente[2] }}</td>
<td>{{ paciente[3] }}</td>

<td>
<a href="/editar_paciente/{{ paciente[0] }}">Editar</a>
<a href="/eliminar_paciente/{{ paciente[0] }}">Eliminar</a>
</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}

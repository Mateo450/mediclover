<!DOCTYPE html>
<html>
<head>
    <title>Citas - MediClover</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">
        <h2>🏥 MediClover</h2>
        <a href="/admin">📊 Dashboard</a>
        <a href="/pacientes">👥 Pacientes</a>
        <a href="/citas" class="active">📅 Citas</a>
        <a href="/logout">🚪 Salir</a>
    </div>

    <div class="main">

        <h1>📅 Gestión de Citas</h1>

        <div class="card">

            <table>
                <tr>
                    <th>Paciente</th>
                    <th>Doctor</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>

                {% for c in citas %}
                <tr>
                    <td>{{ c[1] }} {{ c[2] }}</td>
                    <td>Dr. Luis Suárez</td>
                    <td>{{ c[3] }}</td>
                    <td>{{ c[4] }}</td>

                    <td>
                        <span class="estado {{ c[5] }}">
                            {{ c[5] }}
                        </span>
                    </td>

                    <td>
                        <a href="/completar_cita/{{ c[0] }}">✔</a>
                        <a href="/cancelar_cita/{{ c[0] }}">❌</a>
                    </td>
                </tr>
                {% endfor %}

            </table>

        </div>

    </div>

</div>

</body>
</html>

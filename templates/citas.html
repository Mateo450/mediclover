{% extends "base.html" %}

{% block contenido %}

<h2>Citas</h2>

<table border="1">

<tr>
<th>ID</th><th>Paciente</th><th>Fecha</th><th>Hora</th><th>Estado</th>
</tr>

{% for c in citas %}
<tr>
<td>{{ c[0] }}</td>
<td>{{ c[1] }} {{ c[2] }}</td>
<td>{{ c[3] }}</td>
<td>{{ c[4] }}</td>
<td>{{ c[5] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}

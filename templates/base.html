<!DOCTYPE html>
<html>
<head>
    <title>MediClover</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="navbar">
    <img src="{{ url_for('static', filename='img/logo.png') }}" 
     style="height:45px; border-radius:10px;">

    <div>
        <a href="/">Inicio</a>

        {% if session.get("usuario") %}
            <a href="/admin">Panel Admin</a>
        {% endif %}

        {% if session.get("paciente_id") %}
            <a href="/panel_paciente">Mi Panel</a>
        {% endif %}

        {% if session.get("usuario") or session.get("paciente_id") %}
            <a href="/logout">Cerrar sesión</a>
        {% else %}
            <a href="/login">Admin</a>
            <a href="/login_paciente">Paciente</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block contenido %}{% endblock %}
</div>

</body>
</html>

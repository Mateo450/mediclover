{% extends "base.html" %}

{% block contenido %}

<h2>Editar Cita</h2>

<form method="POST">

<input type="date" name="fecha" value="{{ cita[2] }}">
<input type="time" name="hora" value="{{ cita[3] }}">

<select name="estado">
<option>pendiente</option>
<option>completada</option>
<option>cancelada</option>
</select>

<textarea name="descripcion">{{ cita[4] }}</textarea>

<button>Actualizar</button>

</form>

{% endblock %}

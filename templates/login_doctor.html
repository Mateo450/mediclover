{% extends "base.html" %}
{% block contenido %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh">
  <div class="card shadow-sm" style="width:100%;max-width:420px">

    <div class="card-body p-4">
      <div class="text-center mb-4">
        <img src="/static/img/doctor.png" alt="Doctor"
             style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #1a6b4a">
        <h5 class="mt-3 fw-bold" style="color:#1a6b4a">Acceso médico</h5>
        <p class="text-muted small">Ingresa tus credenciales para continuar</p>
      </div>

      {% if error %}
        <div class="alert alert-danger small py-2">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="usuario" class="form-control"
                   placeholder="Tu usuario" required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn w-100 fw-semibold"
                style="background:#1a6b4a;color:#fff">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="/" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Volver al inicio
        </a>
      </div>
    </div>

  </div>
</div>

{% endblock %}

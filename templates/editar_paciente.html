{% extends "base.html" %}

{% block contenido %}

<h2>Editar Paciente</h2>

<form method="POST">
<input name="nombre" value="{{ paciente[1] }}"><br>
<input name="apellido" value="{{ paciente[2] }}"><br>
<input name="correo" value="{{ paciente[3] }}"><br>
<input name="telefono" value="{{ paciente[4] }}"><br>
<input type="date" name="fecha_nacimiento" value="{{ paciente[5] }}"><br>

<button>Actualizar</button>
</form>

{% endblock %}

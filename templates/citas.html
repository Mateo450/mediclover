<!DOCTYPE html>
<html>
<head>
    <title>Citas - MediClover</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="layout">

    <div class="sidebar">
        <h2>🏥 MediClover</h2>
        <a href="/">📊 Dashboard</a>
        <a href="/pacientes">👥 Pacientes</a>
        <a href="/citas" class="active">📅 Citas</a>
        <a href="/logout">🚪 Salir</a>
    </div>

    <div class="main">

        <h1>📅 Gestión de Citas</h1>

        <!-- FILTRO -->
        <form method="GET" style="margin-bottom:20px;">
            <input type="date" name="fecha">
            <button type="submit" class="btn">🔍 Filtrar</button>
            <a href="/citas" class="btn">❌ Limpiar</a>
        </form>

        <div class="card">

            <table>
                <tr>
                    <th>Paciente</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Estado</th>
                    <th>Descripción</th>
                </tr>

                {% for c in citas %}
                <tr>
                    <td>{{ c[1] }} {{ c[2] }}</td>
                    <td>{{ c[3] }}</td>
                    <td>{{ c[4] }}</td>
                    <td>{{ c[5] }}</td>
                    <td>{{ c[6] }}</td>
                </tr>
                {% endfor %}

            </table>

        </div>

    </div>

</div>

</body>
</html>

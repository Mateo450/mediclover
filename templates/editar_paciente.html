{% extends "base.html" %}
{% block title %}Editar Paciente — MediClover{% endblock %}

{% block contenido %}
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><div class="dot"></div> MediClover</div>
    <a href="/admin"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/pacientes" class="active"><i class="bi bi-people"></i> Pacientes</a>
    <a href="/citas"><i class="bi bi-calendar3"></i> Citas</a>
    <hr style="border-color:rgba(255,255,255,.1); margin:.75rem 1.25rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
  </aside>

  <div class="main">
    <div class="page-header">
      <div>
        <h1>Editar Paciente</h1>
        <p>Modifica los datos del paciente</p>
      </div>
      <a href="/pacientes" class="btn btn-ghost">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
    </div>

    <div class="card" style="max-width:560px;">
      <div class="card-body">
        <form method="POST">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 1rem;">
            <div class="form-group">
              <label>Nombre</label>
              <input type="text" name="nombre" value="{{ paciente[0] }}" required>
            </div>
            <div class="form-group">
              <label>Apellido</label>
              <input type="text" name="apellido" value="{{ paciente[1] }}" required>
            </div>
          </div>
          <div class="form-group">
            <label>Correo</label>
            <input type="email" name="correo" value="{{ paciente[2] }}" required>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 1rem;">
            <div class="form-group">
              <label>Teléfono</label>
              <input type="text" name="telefono" value="{{ paciente[3] }}">
            </div>
            <div class="form-group">
              <label>Cédula</label>
              <input type="text" name="cedula" value="{{ paciente[4] }}">
            </div>
          </div>
          <button type="submit" class="btn btn-block">
            <i class="bi bi-floppy-fill"></i> Guardar cambios
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

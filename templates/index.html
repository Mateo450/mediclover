<!DOCTYPE html>
<html>
<head>
    <title>MediClover - Dashboard</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f2f6f3;
        }

        .topbar{
            background:#1b4332;
            color:white;
            padding:18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .container{
            padding:20px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:15px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
            text-align:center;
        }

        .number{
            font-size:28px;
            font-weight:bold;
            color:#1b4332;
        }

        .label{
            color:#666;
            margin-top:5px;
        }

        .section{
            margin-top:20px;
            background:white;
            padding:15px;
            border-radius:12px;
        }

        a{
            text-decoration:none;
            color:white;
            background:#52b788;
            padding:8px 12px;
            border-radius:8px;
        }

        a:hover{
            background:#40916c;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h2>🏥 MediClover Admin</h2>
    <a href="/logout">Cerrar sesión</a>
</div>

<div class="container">

    <div class="grid">

        <div class="card">
            <div class="number">{{ total_pacientes }}</div>
            <div class="label">Pacientes registrados</div>
        </div>

        <div class="card">
            <div class="number">{{ citas_hoy }}</div>
            <div class="label">Citas hoy</div>
        </div>

        <div class="card">
            <div class="number">{{ citas_pendientes }}</div>
            <div class="label">Citas pendientes</div>
        </div>

    </div>

    <div class="section">
        <h3>Acciones rápidas</h3>

        <p>
            <a href="/registro">➕ Registrar paciente</a>
            <a href="/pacientes">👥 Ver pacientes</a>
            <a href="/citas">📅 Ver citas</a>
        </p>
    </div>

</div>

</body>
</html>

{% extends "base.html" %}
{% block title %}Login Doctor — MediClover{% endblock %}
{% block contenido %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-top">
      <div class="auth-emblem"><i class="bi bi-person-badge-fill"></i></div>
      <h2>Acceso Médico</h2>
      <p>Panel exclusivo para doctores</p>
    </div>
    <div class="auth-body">
      {% if error %}
        <div class="alert error"><i class="bi bi-x-circle-fill"></i> {{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Correo</label>
          <input type="email" name="correo" placeholder="doctor@mediclover.com" required autofocus>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-block" style="margin-top:.5rem;">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>
      <div class="auth-footer"><a href="/">← Volver al inicio</a></div>
    </div>
  </div>
</div>
{% endblock %}

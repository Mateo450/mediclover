<!DOCTYPE html>
<html>
<head>
    <title>Panel Paciente</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
        }

        .topbar{
            background:#2c3e50;
            color:white;
            padding:15px;
        }

        .container{
            padding:20px;
        }

        .card{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .estado{
            padding:5px 10px;
            border-radius:8px;
            font-size:12px;
            color:white;
        }

        .pendiente{background:orange;}
        .completada{background:green;}
        .cancelada{background:red;}
    </style>
</head>

<body>

<div class="topbar">
    <h2>👤 Bienvenido {{ session["paciente_nombre"] }}</h2>
</div>

<div class="container">

    <h3>📅 Mis Citas</h3>

    {% for c in citas %}

    <div class="card">
        <p><b>Fecha:</b> {{ c[0] }}</p>
        <p><b>Hora:</b> {{ c[1] }}</p>
        <p><b>Descripción:</b> {{ c[3] }}</p>

        <span class="estado {{ c[2] }}">
            {{ c[2] }}
        </span>
    </div>

    {% endfor %}

</div>

</body>
</html>

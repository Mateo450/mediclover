{% extends "base.html" %}
{% block contenido %}

<div class="d-flex" style="min-height:100vh">

  <!-- SIDEBAR ADMIN -->
  <aside style="width:240px;background:#1a3c2e;color:#fff;padding:2rem 1rem;flex-shrink:0">
    <p class="fw-bold mb-4" style="font-size:1.1rem">
      <i class="bi bi-shield-lock me-2"></i>Admin
    </p>
    <nav class="d-flex flex-column gap-2">
      <a href="/admin"          class="btn btn-sm btn-outline-light text-start"><i class="bi bi-grid me-2"></i>Dashboard</a>
      <a href="/pacientes"      class="btn btn-sm btn-outline-light text-start"><i class="bi bi-people me-2"></i>Pacientes</a>
      <a href="/citas"          class="btn btn-sm btn-outline-light text-start"><i class="bi bi-calendar2-check me-2"></i>Citas</a>
      <a href="/admin/doctores" class="btn btn-sm btn-light text-start"><i class="bi bi-person-badge me-2"></i>Doctores</a>
      <a href="/logout"         class="btn btn-sm btn-outline-light text-start mt-4"><i class="bi bi-box-arrow-left me-2"></i>Salir</a>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <main class="flex-grow-1 p-4" style="background:#f4f7f5">
    <div class="d-flex justify-content-center">
      <div class="card shadow-sm" style="width:100%;max-width:520px">
        <div class="card-header fw-semibold" style="background:#e8f5ee;color:#1a6b4a">
          <i class="bi bi-person-plus me-2"></i>Crear nuevo doctor
        </div>
        <div class="card-body p-4">

          {% if error %}
            <div class="alert alert-danger small py-2">
              <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
            </div>
          {% endif %}

          <form method="POST">

            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold small">Nombre</label>
                <input type="text" name="nombre" class="form-control"
                       placeholder="Luis" required>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold small">Apellido</label>
                <input type="text" name="apellido" class="form-control"
                       placeholder="Suárez" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold small">
                Usuario <span class="text-muted">(para iniciar sesión)</span>
              </label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="usuario" class="form-control"
                       placeholder="Ej: Luis54" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold small">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold small">Especialidad</label>
              <input type="text" name="especialidad" class="form-control"
                     placeholder="Ej: Médico General" value="Médico General">
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn flex-grow-1 fw-semibold"
                      style="background:#1a6b4a;color:#fff">
                <i class="bi bi-person-check me-2"></i>Crear doctor
              </button>
              <a href="/admin/doctores" class="btn btn-outline-secondary">
                Cancelar
              </a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </main>

</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Iniciar sesión — MediClover{% endblock %}

{% block contenido %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-top">
      <div class="auth-emblem"><i class="bi bi-person-circle"></i></div>
      <h2>Bienvenido de vuelta</h2>
      <p>Ingresa con tu correo registrado</p>
    </div>

    <div class="auth-body">
      {% if error %}
        <div class="alert error">
          <i class="bi bi-x-circle-fill"></i> {{ error }}
        </div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" name="correo" placeholder="tucorreo@ejemplo.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-block" style="margin-top:.5rem;">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="/registro_paciente">Regístrate gratis</a>
      </div>
    </div>

  </div>
</div>
{% endblock %}

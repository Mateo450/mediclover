{% extends "base.html" %}

{% block contenido %}

<h2>Pacientes</h2>

<form method="GET">
    <input name="buscar" placeholder="Buscar paciente">
    <button>Buscar</button>
</form>

<table border="1">
<tr>
<th>ID</th><th>Nombre</th><th>Apellido</th><th>Correo</th><th>Acción</th>
</tr>

{% for p in pacientes %}
<tr>
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/eliminar_paciente/{{ p[0] }}">Eliminar</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}

{% extends "base.html" %}

{% block contenido %}

<h2>Registrar Cita</h2>

<form method="POST">

<select name="id_paciente">
{% for p in pacientes %}
<option value="{{ p[0] }}">{{ p[1] }} {{ p[2] }}</option>
{% endfor %}
</select>

<input type="date" name="fecha">
<input type="time" name="hora">
<textarea name="descripcion"></textarea>

<button>Registrar</button>

</form>

{% endblock %}

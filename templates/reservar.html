<!DOCTYPE html>
<html>
<head>
    <title>Reservar Cita</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="navbar">
    <h2>🏥 MediClover</h2>
    <div>
        <a href="/panel_paciente">Volver</a>
        <a href="/">Inicio</a>
        <a href="/logout">Cerrar sesión</a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2>📅 Reservar cita</h2>
        <p><b>Doctor asignado:</b> Dr. Luis Suárez</p>
    </div>

    {% if mensaje %}
        <div class="{{ tipo }}">
            {{ mensaje }}
        </div>
    {% endif %}

    <div class="card">

        <form method="POST">

            <label>Fecha</label>
            <input type="date" name="fecha" required>

            <label>Hora</label>
            <input type="time" name="hora" required>

            <label>Descripción</label>
            <textarea name="descripcion"></textarea>

            <button class="btn">Reservar</button>

        </form>

    </div>

</div>

</body>
</html>

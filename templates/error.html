{% extends "base.html" %}
{% block title %}{{ codigo }} — MediClover{% endblock %}

{% block contenido %}
<div style="flex:1;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(145deg,#eaf4f0 0%,var(--white) 50%,#e8f0f8 100%);
            padding:3rem 1.5rem;">
  <div style="text-align:center;max-width:480px;">

    <!-- Código de error grande -->
    <div style="font-family:var(--font-display);font-size:7rem;font-weight:700;
                color:var(--navy);line-height:1;margin-bottom:.5rem;
                opacity:.08;user-select:none;">
      {{ codigo }}
    </div>

    <!-- Ícono -->
    <div style="width:72px;height:72px;background:var(--teal-pale);
                border-radius:50%;display:flex;align-items:center;
                justify-content:center;margin:-4rem auto 1.5rem;
                font-size:1.75rem;color:var(--teal);position:relative;z-index:1;">
      <i class="bi {{ icono or 'bi-exclamation-circle' }}"></i>
    </div>

    <h1 style="font-family:var(--font-display);font-size:1.6rem;
               color:var(--navy);margin-bottom:.6rem;">
      {{ titulo }}
    </h1>

    <p style="font-size:.93rem;color:var(--gray-500);line-height:1.75;
              margin-bottom:2rem;">
      {{ mensaje }}
    </p>

    <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;">
      <a href="/" class="btn">
        <i class="bi bi-house-fill"></i> Ir al inicio
      </a>
      <button onclick="history.back()" class="btn btn-ghost">
        <i class="bi bi-arrow-left"></i> Volver
      </button>
    </div>

    <p style="margin-top:2rem;font-size:.78rem;color:var(--gray-400);">
      MediClover · Error {{ codigo }}
    </p>

  </div>
</div>
{% endblock %}

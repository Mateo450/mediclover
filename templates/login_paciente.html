{% extends "base.html" %}
{% block title %}Iniciar sesión — MediClover{% endblock %}

{% block contenido %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-top">
      <div class="auth-emblem"><i class="bi bi-person-circle"></i></div>
      <h2>Bienvenido de vuelta</h2>
      <p>Ingresa con tu correo y contraseña</p>
    </div>

    <div class="auth-body">

      {% if error %}
        <div class="alert error">
          <i class="bi bi-x-circle-fill"></i> {{ error }}
        </div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" name="correo"
                 placeholder="tucorreo@ejemplo.com"
                 value="{{ request.form.get('correo','') }}"
                 required autofocus autocomplete="email">
        </div>

        <div class="form-group" style="position:relative;">
          <label>Contraseña</label>
          <div style="position:relative;">
            <input type="password" name="password" id="passInput"
                   placeholder="••••••••"
                   required autocomplete="current-password"
                   style="padding-right:2.8rem;">
            <button type="button" onclick="togglePass()"
                    style="position:absolute;right:.65rem;top:50%;transform:translateY(-50%);
                           background:none;border:none;cursor:pointer;
                           color:var(--gray-400);font-size:1rem;padding:0;line-height:1;">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-block" style="margin-top:.5rem;">
          <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta? <a href="/registro_paciente">Regístrate gratis</a>
      </div>
    </div>

  </div>
</div>

<script>
function togglePass() {
  const i = document.getElementById('passInput');
  const e = document.getElementById('eyeIcon');
  if (i.type === 'password') { i.type = 'text'; e.className = 'bi bi-eye-slash'; }
  else { i.type = 'password'; e.className = 'bi bi-eye'; }
}
</script>
{% endblock %}

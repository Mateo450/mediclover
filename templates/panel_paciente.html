<!DOCTYPE html>
<html>
<head>
    <title>MediClover - Panel Paciente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🏥 MediClover</h2>
    <a href="/logout">Cerrar sesión</a>
</div>

<div class="container">

    <!-- BIENVENIDA -->
    <div class="card">
        <h3>👤 Bienvenido {{ session["paciente_nombre"] }}</h3>
        <p>Gestiona tus citas de forma rápida.</p>

        <br>

        <a href="/reservar" class="btn">➕ Reservar cita</a>
    </div>

    <h3 style="margin-top:20px;">📅 Tus Citas</h3>

    {% for c in citas %}

    <div class="card">

        <p><b>📆 Fecha:</b> {{ c[0] }}</p>
        <p><b>⏰ Hora:</b> {{ c[1] }}</p>
        <p><b>📝 Motivo:</b> {{ c[3] }}</p>

        <span class="estado {{ c[2] }}">
            {{ c[2] }}
        </span>

    </div>

    {% endfor %}

</div>

</body>
</html>

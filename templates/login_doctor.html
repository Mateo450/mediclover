{% extends "base.html" %}
{% block contenido %}

<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;background:linear-gradient(135deg,#f0faf5 0%,#e8f5ee 100%)">
  <div class="card shadow" style="width:100%;max-width:440px;border:none;border-radius:20px;overflow:hidden">

    <!-- Header verde -->
    <div style="background:linear-gradient(135deg,#1a6b4a,#2d9c6e);padding:2rem;text-align:center">
      <img src="/static/img/doctor.png" alt="Doctor"
           style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,0.3);margin-bottom:1rem">
      <h4 class="text-white fw-bold mb-1" style="font-size:1.3rem">Acceso médico</h4>
      <p class="mb-0" style="color:rgba(255,255,255,0.75);font-size:.875rem">Panel exclusivo para doctores</p>
    </div>

    <div class="card-body p-4">

      {% if error %}
        <div class="alert alert-danger small py-2 mb-3">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      {% if mensaje %}
        <div class="alert alert-{{ 'success' if tipo == 'success' else 'danger' }} small py-2 mb-3">
          <i class="bi bi-{{ 'check-circle' if tipo == 'success' else 'exclamation-circle' }} me-1"></i>{{ mensaje }}
        </div>
      {% endif %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold small" style="color:#1a6b4a">Usuario</label>
          <div class="input-group">
            <span class="input-group-text" style="background:#f0faf5;border-color:#c8e6d4">
              <i class="bi bi-person" style="color:#1a6b4a"></i>
            </span>
            <input type="text" name="usuario" class="form-control"
                   style="border-color:#c8e6d4"
                   placeholder="Ej: Luis54"
                   value="{{ request.form.get('usuario','') }}"
                   required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small" style="color:#1a6b4a">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text" style="background:#f0faf5;border-color:#c8e6d4">
              <i class="bi bi-lock" style="color:#1a6b4a"></i>
            </span>
            <input type="password" name="password" id="passInput"
                   class="form-control" style="border-color:#c8e6d4"
                   placeholder="••••••••" required>
            <button type="button" class="btn btn-outline-secondary"
                    style="border-color:#c8e6d4"
                    onclick="togglePass()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn w-100 fw-semibold py-2"
                style="background:linear-gradient(135deg,#1a6b4a,#2d9c6e);color:#fff;border:none;border-radius:10px;font-size:1rem">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al panel
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="/doctor/recuperar" style="color:#1a6b4a;font-size:.85rem;text-decoration:none">
          <i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?
        </a>
      </div>

      <hr style="border-color:#e8f5ee;margin:1.2rem 0">
      <div class="text-center">
        <a href="/" style="color:#6c757d;font-size:.85rem;text-decoration:none">
          <i class="bi bi-arrow-left me-1"></i>Volver al inicio
        </a>
      </div>

    </div>
  </div>
</div>

<script>
function togglePass() {
  const inp = document.getElementById('passInput');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    ico.className = 'bi bi-eye';
  }
}
</script>

{% endblock %}

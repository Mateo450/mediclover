<!DOCTYPE html>
<html>
<head>
    <title>MediClover Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>MediClover</h2>

        <a href="/admin" class="active">📊 Dashboard</a>
        <a href="/pacientes">👥 Pacientes</a>
        <a href="/citas">📅 Citas</a>
        <a href="/logout">🚪 Salir</a>
    </div>

    <!-- CONTENIDO -->
    <div class="main">

        <h1>📊 Panel de Control</h1>

        <!-- TARJETAS -->
        <div class="grid">

            <div class="card stat">
                <p>👥 Pacientes</p>
                <h2>{{ total_pacientes }}</h2>
            </div>

            <div class="card stat">
                <p>⏳ Pendientes</p>
                <h2>{{ citas_pendientes }}</h2>
            </div>

        </div>

        <!-- ACCIONES -->
        <div class="card">
            <h3>⚡ Acciones rápidas</h3>

            <div class="actions">
                <a href="/registro_paciente" class="btn">➕ Paciente</a>
                <a href="/citas" class="btn">📅 Citas</a>
                <a href="/pacientes" class="btn">👥 Ver</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>

{% extends "base.html" %}
{% block title %}Crear Doctor — MediClover{% endblock %}
{% block contenido %}
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="dot"></div> MediClover</div>
    <a href="/admin"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/pacientes"><i class="bi bi-people"></i> Pacientes</a>
    <a href="/citas"><i class="bi bi-calendar3"></i> Citas</a>
    <a href="/admin/doctores" class="active"><i class="bi bi-person-badge"></i> Doctores</a>
    <hr style="border-color:rgba(255,255,255,.1);margin:.75rem 1.25rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
  </aside>
  <div class="main">
    <div class="page-header">
      <div><h1>Nuevo Doctor</h1><p>Registra un médico en el sistema</p></div>
      <a href="/admin/doctores" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Volver</a>
    </div>
    <div class="card" style="max-width:520px;">
      <div class="card-body">
        {% if error %}
          <div class="alert error"><i class="bi bi-x-circle-fill"></i> {{ error }}</div>
        {% endif %}
        <form method="POST">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 1rem;">
            <div class="form-group">
              <label>Nombre</label>
              <input type="text" name="nombre" required>
            </div>
            <div class="form-group">
              <label>Apellido</label>
              <input type="text" name="apellido" required>
            </div>
          </div>
          <div class="form-group">
            <label>Correo</label>
            <input type="email" name="correo" required>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required minlength="6">
          </div>
          <div class="form-group">
            <label>Especialidad</label>
            <input type="text" name="especialidad" value="Médico General" required>
          </div>
          <button type="submit" class="btn btn-block">
            <i class="bi bi-person-check-fill"></i> Crear doctor
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

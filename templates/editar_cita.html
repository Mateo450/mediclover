{% extends "base.html" %}
{% block title %}Editar Cita — MediClover{% endblock %}

{% block contenido %}
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><div class="dot"></div> MediClover</div>
    <a href="/admin"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/pacientes"><i class="bi bi-people"></i> Pacientes</a>
    <a href="/citas" class="active"><i class="bi bi-calendar3"></i> Citas</a>
    <hr style="border-color:rgba(255,255,255,.1); margin:.75rem 1.25rem;">
    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
  </aside>

  <div class="main">
    <div class="page-header">
      <div>
        <h1>Editar Cita</h1>
        <p>Modifica los datos de la cita</p>
      </div>
      <a href="/citas" class="btn btn-ghost">
        <i class="bi bi-arrow-left"></i> Volver
      </a>
    </div>

    <div class="card" style="max-width:480px;">
      <div class="card-body">
        <form method="POST">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 1rem;">
            <div class="form-group">
              <label>Fecha</label>
              <input type="date" name="fecha" value="{{ cita[2] }}" required>
            </div>
            <div class="form-group">
              <label>Hora</label>
              <input type="time" name="hora" value="{{ cita[3] }}" required>
            </div>
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select name="estado">
              <option {% if cita[4] == 'pendiente'  %}selected{% endif %}>pendiente</option>
              <option {% if cita[4] == 'completada' %}selected{% endif %}>completada</option>
              <option {% if cita[4] == 'cancelada'  %}selected{% endif %}>cancelada</option>
            </select>
          </div>
          <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion">{{ cita[5] if cita[5] else cita[4] }}</textarea>
          </div>
          <button type="submit" class="btn btn-block">
            <i class="bi bi-floppy-fill"></i> Actualizar cita
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
